<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mapbox 3D</title>

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet" />
    <link href="/providers/provider.css" rel="stylesheet" />
  </head>
  <body>
    <div id="scene"></div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <script type="module">
      import { attachOverlay, createProviderRuntime } from "/providers/common.js";

      attachOverlay("Mapbox 3D", "Hosted vector building stack with practical web styling controls.");

      const runtime = await createProviderRuntime({
        providerId: "mapbox",
        capabilities: ["Hosted", "Vector stack", "Good styling freedom"],
        onSettings,
        getCamera,
      });

      if (!runtime.config.env.mapboxAccessToken) {
        runtime.fallback(
          "Mapbox token missing",
          "Add MAPBOX_ACCESS_TOKEN to .env to enable the Mapbox NYC comparison panel.",
        );
        runtime.status("error", "Missing token");
        throw new Error("Missing token");
      }

      mapboxgl.accessToken = runtime.config.env.mapboxAccessToken;

      const map = new mapboxgl.Map({
        container: "scene",
        style: "mapbox://styles/mapbox/light-v11",
        center: [-73.98545, 40.75805],
        zoom: 15.9,
        pitch: 67,
        bearing: 15,
        antialias: true,
        attributionControl: false,
        logoPosition: "bottom-right",
      });
      map.addControl(new mapboxgl.AttributionControl({ compact: true }), "bottom-right");

      const MAPBOX_STYLES = {
        light: "mapbox://styles/mapbox/light-v11",
        dark: "mapbox://styles/mapbox/dark-v11",
        streets: "mapbox://styles/mapbox/streets-v12",
        satellite: "mapbox://styles/mapbox/satellite-streets-v12",
      };
      let currentMapStyle = "light";
      let latestSettings = runtime.settings;

      map.on("style.load", async () => {
        if (map.getLayer("nyc-custom-buildings")) {
          map.removeLayer("nyc-custom-buildings");
        }

        map.addLayer({
          id: "nyc-custom-buildings",
          source: "composite",
          "source-layer": "building",
          filter: ["==", ["get", "extrude"], "true"],
          type: "fill-extrusion",
          minzoom: 12,
          paint: {
            "fill-extrusion-color": runtime.settings.accentColor,
            "fill-extrusion-opacity": runtime.settings.opacity,
            "fill-extrusion-height": [
              "*",
              ["coalesce", ["to-number", ["get", "height"]], 20],
              runtime.settings.heightScale,
            ],
            "fill-extrusion-base": [
              "*",
              ["coalesce", ["to-number", ["get", "min_height"]], 0],
              runtime.settings.heightScale,
            ],
            "fill-extrusion-vertical-gradient": true,
          },
        });

        // Footprint outlines for ArcGIS-style edge definition
        map.addLayer({
          id: "nyc-building-outlines",
          source: "composite",
          "source-layer": "building",
          filter: ["==", ["get", "extrude"], "true"],
          type: "line",
          minzoom: 13,
          paint: {
            "line-color": runtime.settings.surfaceColor,
            "line-opacity": 0.25,
            "line-width": 0.8,
          },
        });

        await onSettings(latestSettings);
        runtime.ready("Mapbox ready");
        runtime.reportMetrics();
      });

      // Darken/lighten hex color by a factor (-1 to 1)
      function adjustColor(hex, factor) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const adjust = (c) => {
          if (factor > 0) return Math.round(c + (255 - c) * factor);
          return Math.round(c * (1 + factor));
        };
        return `#${adjust(r).toString(16).padStart(2,"0")}${adjust(g).toString(16).padStart(2,"0")}${adjust(b).toString(16).padStart(2,"0")}`;
      }

      async function onSettings(settings) {
        latestSettings = settings;

        // Swap base map style if changed
        const wantStyle = settings.mapStyle || "light";
        if (wantStyle !== currentMapStyle && MAPBOX_STYLES[wantStyle]) {
          currentMapStyle = wantStyle;
          map.setStyle(MAPBOX_STYLES[wantStyle]);
          return; // style.load will re-call onSettings
        }

        if (!map.getLayer("nyc-custom-buildings")) {
          return;
        }

        // Zoom offset to match Cesium/ArcGIS framing at the same settings
        const ZOOM_OFFSET = -0.7;
        map.easeTo({
          center: [settings.center.lng, settings.center.lat],
          zoom: settings.zoom + ZOOM_OFFSET,
          pitch: settings.pitch,
          bearing: settings.bearing,
          duration: 900,
        });

        // Fog
        if (settings.fog !== false) {
          map.setFog({
            range: [2, 16],
            color: "#e8e6e3",
            "high-color": "#d4d0cc",
            "space-color": "#b8b4b0",
            "horizon-blend": (settings.fogDensity ?? 0.3) * 0.12,
          });
        } else {
          map.setFog(null);
        }

        // Light
        map.setLight({
          anchor: "viewport",
          color: "#ffffff",
          intensity: Math.min(1, settings.lightIntensity ?? 0.5),
          position: [1.15, settings.lightAngle ?? 210, settings.lightAltitude ?? 30],
        });

        // Ambient occlusion
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-ambient-occlusion-intensity", settings.ambientOcclusion ?? 0.75);
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-ambient-occlusion-radius", 6);

        // Height-based color gradient to match Cesium's depth rendering
        const accent = settings.accentColor;
        const darkBase = adjustColor(accent, -0.3);
        const midTone = adjustColor(accent, -0.1);
        const tallTint = adjustColor(accent, 0.15);
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-color", [
          "interpolate", ["linear"],
          ["coalesce", ["to-number", ["get", "height"]], 20],
          0, darkBase,
          30, accent,
          80, midTone,
          150, tallTint,
        ]);
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-opacity", settings.opacity);
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-vertical-gradient", settings.verticalGradient !== false);
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-height", [
          "*",
          ["coalesce", ["to-number", ["get", "height"]], 20],
          settings.heightScale,
        ]);
        map.setPaintProperty("nyc-custom-buildings", "fill-extrusion-base", [
          "*",
          ["coalesce", ["to-number", ["get", "min_height"]], 0],
          settings.heightScale,
        ]);

        // Outlines / wireframe
        if (map.getLayer("nyc-building-outlines")) {
          map.setPaintProperty("nyc-building-outlines", "line-color", settings.surfaceColor);
          map.setPaintProperty("nyc-building-outlines", "line-width", settings.edgeSize ?? 0.8);
          map.setLayoutProperty("nyc-building-outlines", "visibility", settings.wireframe ? "visible" : "visible");
        }

        // Labels
        for (const layer of map.getStyle().layers || []) {
          if (layer.type === "symbol") {
            map.setLayoutProperty(layer.id, "visibility", settings.labels ? "visible" : "none");
          }
        }
      }

      function getCamera() {
        const center = map.getCenter();
        return {
          lng: center.lng,
          lat: center.lat,
        };
      }
    </script>
  </body>
</html>
