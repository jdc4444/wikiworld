<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Sample</title>

    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="/providers/provider.css" rel="stylesheet" />
  </head>
  <body>
    <div id="scene"></div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module">
      import { attachOverlay, createProviderRuntime } from "/providers/common.js";

      attachOverlay("Open sample stack", "Local GeoJSON extrusion stack for maximum styling freedom.");

      const runtime = await createProviderRuntime({
        providerId: "open-sample",
        capabilities: ["Open", "Local data", "High styling freedom"],
        onSettings,
        getCamera,
      });

      const map = new maplibregl.Map({
        container: "scene",
        style: "https://tiles.openfreemap.org/styles/positron",
        center: [-73.98545, 40.75805],
        zoom: 15.9,
        pitch: 67,
        bearing: 15,
        antialias: true,
        attributionControl: false,
      });

      const OPEN_STYLES = {
        light: "https://tiles.openfreemap.org/styles/positron",
        dark: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
        streets: "https://tiles.openfreemap.org/styles/liberty",
        satellite: "https://tiles.openfreemap.org/styles/positron",
      };
      let currentMapStyle = "light";
      let latestSettings = runtime.settings;
      let geojsonCache = null;

      map.on("style.load", async () => {
        if (!geojsonCache) {
          geojsonCache = await fetch("/data/nyc-sample-buildings.geojson").then((r) => r.json());
        }
        if (map.getLayer("nyc-footprints")) map.removeLayer("nyc-footprints");
        if (map.getSource("nyc-sample")) map.removeSource("nyc-sample");
        map.addSource("nyc-sample", { type: "geojson", data: geojsonCache });

        const s = latestSettings;
        map.setLight({
          anchor: "viewport",
          color: "#ffffff",
          intensity: Math.min(1, s.lightIntensity ?? 0.5),
          position: [1.15, s.lightAngle ?? 210, s.lightAltitude ?? 30],
        });

        map.addLayer({
          id: "nyc-footprints",
          type: "fill-extrusion",
          source: "nyc-sample",
          paint: {
            "fill-extrusion-color": [
              "interpolate", ["linear"], ["get", "height"],
              0, s.accentColor,
              200, s.accentColor,
              541, "#ffd8b0",
            ],
            "fill-extrusion-opacity": s.opacity,
            "fill-extrusion-height": ["*", ["get", "height"], s.heightScale],
            "fill-extrusion-base": ["*", ["coalesce", ["get", "minHeight"], 0], s.heightScale],
            "fill-extrusion-vertical-gradient": true,
          },
        });

        await onSettings(latestSettings);
        runtime.ready("Open stack ready");
        runtime.reportMetrics();
      });

      async function onSettings(settings) {
        latestSettings = settings;

        // Swap base map style if changed
        const wantStyle = settings.mapStyle || "light";
        if (wantStyle !== currentMapStyle && OPEN_STYLES[wantStyle]) {
          currentMapStyle = wantStyle;
          map.setStyle(OPEN_STYLES[wantStyle]);
          return; // style.load will re-call onSettings
        }

        if (!map.getLayer("nyc-footprints")) {
          return;
        }

        // Zoom offset to match Cesium/ArcGIS framing at the same settings
        const ZOOM_OFFSET = -1.0;
        map.easeTo({
          center: [settings.center.lng, settings.center.lat],
          zoom: settings.zoom + ZOOM_OFFSET,
          pitch: settings.pitch,
          bearing: settings.bearing,
          duration: 800,
        });

        map.setLight({
          anchor: "viewport",
          color: "#ffffff",
          intensity: Math.min(1, settings.lightIntensity ?? 0.5),
          position: [1.15, settings.lightAngle ?? 210, settings.lightAltitude ?? 30],
        });

        map.setPaintProperty("nyc-footprints", "fill-extrusion-color", [
          "interpolate", ["linear"], ["get", "height"],
          0, settings.accentColor,
          200, settings.accentColor,
          541, "#ffffff",
        ]);
        map.setPaintProperty("nyc-footprints", "fill-extrusion-opacity", settings.opacity);
        map.setPaintProperty("nyc-footprints", "fill-extrusion-height", [
          "*",
          ["get", "height"],
          settings.heightScale,
        ]);
        map.setPaintProperty("nyc-footprints", "fill-extrusion-base", [
          "*",
          ["coalesce", ["get", "minHeight"], 0],
          settings.heightScale,
        ]);
      }

      function getCamera() {
        const center = map.getCenter();
        return {
          lng: center.lng,
          lat: center.lat,
        };
      }
    </script>
  </body>
</html>
