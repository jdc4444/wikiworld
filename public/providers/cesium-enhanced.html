<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cesium Enhanced</title>

    <link href="https://cesium.com/downloads/cesiumjs/releases/1.126/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
    <link href="/providers/provider.css" rel="stylesheet" />
  </head>
  <body>
    <div id="scene"></div>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.126/Build/Cesium/Cesium.js" crossorigin="anonymous"></script>
    <script type="module">
      import { attachOverlay, createProviderRuntime, zoomToRangeMeters } from "/providers/common.js";

      attachOverlay("Cesium Enhanced", "Cesium OSM with built-in AO, ACES tone mapping, and CAS sharpening.");

      const runtime = await createProviderRuntime({
        providerId: "cesium-enhanced",
        capabilities: ["3D Tiles", "SSAO", "Tone mapping", "Sharpening"],
        onSettings,
        getCamera,
      });

      if (!runtime.config.env.cesiumIonToken) {
        runtime.fallback(
          "Cesium ion token recommended",
          "Add CESIUM_ION_TOKEN to .env to enable Cesium OSM Buildings reliably in this tester.",
        );
        runtime.status("error", "Missing token");
        throw new Error("Missing token");
      }

      Cesium.Ion.defaultAccessToken = runtime.config.env.cesiumIonToken;

      /* ── Custom GLSL (tonemap + sharpen only — SSAO uses Cesium built-in) ── */

      // Match Cesium built-in shader format exactly (brightness stage reference)
      const tonemapShader = `
        uniform sampler2D colorTexture;
        uniform float exposure;
        uniform float warmth;
        uniform float contrast;
        in vec2 v_textureCoordinates;
        void main(void) {
          vec3 rgb = texture(colorTexture, v_textureCoordinates).rgb;
          rgb *= exposure;
          rgb.r *= 1.0 + warmth * 0.04;
          rgb.g *= 1.0 - warmth * 0.015;
          rgb.b *= 1.0 - warmth * 0.06;
          rgb = mix(vec3(0.5), rgb, contrast);
          out_FragColor = vec4(rgb, 1.0);
        }
      `;

      const sharpenShader = `
        uniform sampler2D colorTexture;
        uniform float sharpness;
        uniform vec2 pixelSize;
        in vec2 v_textureCoordinates;
        void main() {
          vec3 c = texture(colorTexture, v_textureCoordinates).rgb;
          vec3 u = texture(colorTexture, v_textureCoordinates + vec2(0.0, pixelSize.y)).rgb;
          vec3 d = texture(colorTexture, v_textureCoordinates - vec2(0.0, pixelSize.y)).rgb;
          vec3 l = texture(colorTexture, v_textureCoordinates - vec2(pixelSize.x, 0.0)).rgb;
          vec3 r = texture(colorTexture, v_textureCoordinates + vec2(pixelSize.x, 0.0)).rgb;
          vec3 blur = (u + d + l + r) * 0.25;
          vec3 diff = c - blur;
          out_FragColor = vec4(clamp(c + diff * sharpness, 0.0, 1.0), 1.0);
        }
      `;

      /* ── Viewer ──────────────────────────────────────────────────────── */

      let viewer, tileset;
      try {
        viewer = new Cesium.Viewer("scene", {
          animation: false,
          baseLayerPicker: false,
          geocoder: false,
          homeButton: false,
          infoBox: false,
          timeline: false,
          navigationHelpButton: false,
          sceneModePicker: false,
          selectionIndicator: false,
          baseLayer: new Cesium.ImageryLayer(
            new Cesium.OpenStreetMapImageryProvider({
              url: "https://basemaps.cartocdn.com/light_nolabels/",
            }),
          ),
        });
      } catch (e) {
        console.error("Cesium Viewer init failed:", e);
        runtime.fallback("Viewer failed", e.message);
        runtime.status("error", "Viewer: " + e.message);
        throw e;
      }

      const CESIUM_IMAGERY = {
        light: "https://basemaps.cartocdn.com/light_nolabels/",
        dark: "https://basemaps.cartocdn.com/dark_nolabels/",
        streets: "https://tile.openstreetmap.org/",
        satellite: null,
      };
      let currentMapStyle = "light";

      function swapImagery(styleKey) {
        if (styleKey === currentMapStyle) return;
        currentMapStyle = styleKey;
        viewer.imageryLayers.removeAll();
        if (styleKey === "satellite") {
          viewer.imageryLayers.addImageryProvider(
            new Cesium.IonImageryProvider({ assetId: 2 })
          );
        } else {
          viewer.imageryLayers.addImageryProvider(
            new Cesium.OpenStreetMapImageryProvider({
              url: CESIUM_IMAGERY[styleKey] || CESIUM_IMAGERY.light,
            })
          );
        }
      }

      // Scene settings — enhanced from cesium-osm baseline
      viewer.scene.globe.depthTestAgainstTerrain = false;
      viewer.scene.globe.enableLighting = true;
      viewer.scene.setTerrain(Cesium.Terrain.fromWorldTerrain());
      viewer.shadows = true;
      viewer.shadowMap.size = 4096;
      viewer.shadowMap.softShadows = true;
      viewer.shadowMap.darkness = 0.3;   // subtle like ArcGIS
      viewer.shadowMap.maximumDistance = 5000;
      viewer.scene.fog.enabled = true;
      viewer.scene.fog.density = 0.0002;
      viewer.scene.skyAtmosphere.show = true;
      viewer.scene.globe.showGroundAtmosphere = true;
      viewer.scene.logarithmicDepthBuffer = true;
      viewer.scene.msaaSamples = 4;
      viewer.cesiumWidget.creditContainer.style.display = "none";
      viewer.camera.frustum.fov = 0.6435;

      /* ── Post-Processing Pipeline ──────────────────────────────────── */

      // Custom tonemap — warm color grade toward ArcGIS terracotta
      const tonemapStage = new Cesium.PostProcessStage({
        name: "tonemap",
        fragmentShader: tonemapShader,
        uniforms: {
          exposure: 1.3,
          warmth: 0.5,
          contrast: 1.05,
        },
      });
      viewer.scene.postProcessStages.add(tonemapStage);

      // Sharpening — crisp building edges
      const sharpenStage = new Cesium.PostProcessStage({
        name: "sharpen",
        fragmentShader: sharpenShader,
        uniforms: {
          sharpness: 0.35,
          pixelSize: function () {
            return new Cesium.Cartesian2(
              1.0 / viewer.scene.drawingBufferWidth,
              1.0 / viewer.scene.drawingBufferHeight
            );
          },
        },
      });
      viewer.scene.postProcessStages.add(sharpenStage);

      // FXAA on top
      if (viewer.scene.postProcessStages?.fxaa) {
        viewer.scene.postProcessStages.fxaa.enabled = true;
      }

      /* ── Camera ──────────────────────────────────────────────────────── */

      function applyCameraLookAt(s, instant) {
        const vh = document.getElementById("scene").clientHeight || 500;
        const range = zoomToRangeMeters(s.zoom, s.center.lat, vh);
        const target = Cesium.Cartesian3.fromDegrees(s.center.lng, s.center.lat, 0);
        const hpr = new Cesium.HeadingPitchRange(
          Cesium.Math.toRadians(s.bearing),
          Cesium.Math.toRadians(s.pitch - 90),
          range,
        );
        if (instant) {
          viewer.camera.lookAt(target, hpr);
          viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
        } else {
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(
              s.center.lng, s.center.lat, range * Math.cos(Cesium.Math.toRadians(s.pitch))),
            orientation: {
              heading: Cesium.Math.toRadians(s.bearing),
              pitch: Cesium.Math.toRadians(s.pitch - 90),
              roll: 0,
            },
            duration: 0.9,
          });
        }
      }
      applyCameraLookAt({ ...runtime.settings, center: runtime.settings.center }, true);

      /* ── Tileset ───────────────────────────────────────────────────── */

      try {
        tileset = await Cesium.createOsmBuildingsAsync();
      } catch (e) {
        console.error("createOsmBuildingsAsync failed:", e);
        runtime.fallback("OSM Buildings failed", e.message);
        runtime.status("error", "OSM: " + e.message);
        throw e;
      }
      tileset.shadows = Cesium.ShadowMode.ENABLED;

      // Aggressive LOD — close the density gap with ArcGIS
      tileset.maximumScreenSpaceError = 4;   // default 16
      tileset.maximumMemoryUsage = 1024;     // 1GB tile cache
      tileset.preloadWhenHidden = true;
      tileset.skipLevelOfDetail = false;     // load all LOD levels

      // IBL ambient fill — softens shadow-side faces like ArcGIS
      if (tileset.imageBasedLighting) {
        tileset.imageBasedLighting.imageBasedLightingFactor = new Cesium.Cartesian2(3.0, 3.0);
      }

      viewer.scene.primitives.add(tileset);

      // Softer directional than baseline — IBL carries the ambient
      viewer.scene.light = new Cesium.DirectionalLight({
        direction: new Cesium.Cartesian3(0.3, -0.5, -0.82),
        intensity: 1.4,
      });
      viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString("#c8c4be");

      let latestSettings = runtime.settings;
      await onSettings(latestSettings, true);

      tileset.initialTilesLoaded.addEventListener(() => {
        onSettings(latestSettings, true);
      });

      runtime.ready("Cesium Enhanced ready");
      runtime.reportMetrics();

      /* ── Settings ──────────────────────────────────────────────────── */

      function lerpHex(hex1, hex2, t) {
        const r1 = parseInt(hex1.slice(1, 3), 16);
        const g1 = parseInt(hex1.slice(3, 5), 16);
        const b1 = parseInt(hex1.slice(5, 7), 16);
        const r2 = parseInt(hex2.slice(1, 3), 16);
        const g2 = parseInt(hex2.slice(3, 5), 16);
        const b2 = parseInt(hex2.slice(5, 7), 16);
        const r = Math.round(r1 + (r2 - r1) * t).toString(16).padStart(2, "0");
        const g = Math.round(g1 + (g2 - g1) * t).toString(16).padStart(2, "0");
        const b = Math.round(b1 + (b2 - b1) * t).toString(16).padStart(2, "0");
        return `#${r}${g}${b}`;
      }

      async function onSettings(settings, instant) {
        latestSettings = settings;
        swapImagery(settings.mapStyle || "light");

        // Lighting — softer than baseline, IBL carries ambient
        viewer.scene.globe.enableLighting = true;
        viewer.shadows = settings.sun !== false;
        viewer.shadowMap.darkness = settings.shadowDarkness ?? 0.3;
        viewer.shadowMap.softShadows = true;
        viewer.shadowMap.maximumDistance = 5000;
        {
          const angle = Cesium.Math.toRadians(settings.lightAngle ?? 210);
          const alt = Cesium.Math.toRadians(settings.lightAltitude ?? 40);
          viewer.scene.light = new Cesium.DirectionalLight({
            direction: new Cesium.Cartesian3(
              Math.sin(angle) * Math.cos(alt),
              Math.cos(angle) * Math.cos(alt),
              -Math.sin(alt),
            ),
            intensity: settings.lightIntensity ?? 1.4,
          });
        }
        // Maintain IBL fill
        if (tileset.imageBasedLighting) {
          tileset.imageBasedLighting.imageBasedLightingFactor = new Cesium.Cartesian2(3.0, 3.0);
        }

        // Atmosphere
        viewer.scene.fog.enabled = settings.fog !== false;
        viewer.scene.fog.density = (settings.fogDensity ?? 0.15) * 0.001;
        viewer.scene.skyAtmosphere.show = settings.sky !== false;
        viewer.scene.skyAtmosphere.hueShift = settings.skyHueShift ?? 0;
        viewer.scene.skyAtmosphere.saturationShift = settings.skySaturation ?? 0;
        viewer.scene.skyAtmosphere.brightnessShift = settings.skyBrightness ?? 0;

        // FXAA
        if (viewer.scene.postProcessStages?.fxaa) {
          viewer.scene.postProcessStages.fxaa.enabled = settings.fxaa !== false;
        }

        // Tonemap
        tonemapStage.uniforms.exposure = settings.tonemapExposure ?? 1.3;
        tonemapStage.uniforms.warmth = settings.tonemapWarmth ?? 0.5;
        tonemapStage.uniforms.contrast = settings.tonemapContrast ?? 1.05;
        tonemapStage.enabled = settings.tonemapping !== false;

        // Sharpen
        sharpenStage.uniforms.sharpness = settings.sharpenAmount ?? 0.35;
        sharpenStage.enabled = settings.sharpening !== false;

        // Color gradient
        const tall = lerpHex(settings.accentColor, "#ffd8b0", 0.3);
        const mid = lerpHex(settings.accentColor, "#ffd8b0", 0.12);
        const low = settings.accentColor;
        const base = lerpHex(settings.accentColor, settings.surfaceColor, 0.35);

        tileset.style = new Cesium.Cesium3DTileStyle({
          color: {
            conditions: [
              ["${feature['cesium#estimatedHeight']} > 150", `color('${tall}', 1.0)`],
              ["${feature['cesium#estimatedHeight']} > 80", `color('${mid}', 1.0)`],
              ["${feature['cesium#estimatedHeight']} > 30", `color('${low}', 1.0)`],
              ["true", `color('${base}', 1.0)`],
            ],
          },
        });

        applyCameraLookAt(settings, instant);
      }

      function getCamera() {
        const cartographic = Cesium.Cartographic.fromCartesian(viewer.camera.positionWC);
        return {
          lng: Cesium.Math.toDegrees(cartographic.longitude),
          lat: Cesium.Math.toDegrees(cartographic.latitude),
        };
      }
    </script>
  </body>
</html>
