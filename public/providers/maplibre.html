<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MapLibre GL JS</title>

    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="/providers/provider.css" rel="stylesheet" />
  </head>
  <body>
    <div id="scene"></div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module">
      import { attachOverlay, createProviderRuntime } from "/providers/common.js";

      attachOverlay("MapLibre GL JS", "Open-source map with vector tile buildings from OpenFreeMap.");

      const runtime = await createProviderRuntime({
        providerId: "maplibre",
        capabilities: ["Open source", "Vector tiles", "fill-extrusion", "No key required"],
        onSettings,
        getCamera,
      });

      const map = new maplibregl.Map({
        container: "scene",
        style: "https://tiles.openfreemap.org/styles/positron",
        center: [-73.98545, 40.75805],
        zoom: 15.9,
        pitch: 67,
        bearing: 15,
        antialias: true,
        attributionControl: false,
        maxPitch: 85,
      });

      const MAPLIBRE_STYLES = {
        light: "https://tiles.openfreemap.org/styles/positron",
        dark: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
        streets: "https://tiles.openfreemap.org/styles/liberty",
        satellite: "https://tiles.openfreemap.org/styles/positron", // no satellite available
      };
      let currentMapStyle = "light";
      let latestSettings = runtime.settings;

      map.on("style.load", async () => {
        // Remove the default 3d-buildings layer if it exists so we can add our own styled version
        if (map.getLayer("building-3d")) {
          map.removeLayer("building-3d");
        }

        // Find the building source — OpenFreeMap uses openmaptiles source with "building" source-layer
        const sourceId = "openmaptiles";

        map.addLayer({
          id: "nyc-buildings-3d",
          source: sourceId,
          "source-layer": "building",
          type: "fill-extrusion",
          minzoom: 12,
          paint: {
            "fill-extrusion-color": runtime.settings.accentColor,
            "fill-extrusion-opacity": runtime.settings.opacity,
            "fill-extrusion-height": [
              "*",
              ["coalesce", ["get", "render_height"], 20],
              runtime.settings.heightScale,
            ],
            "fill-extrusion-base": [
              "*",
              ["coalesce", ["get", "render_min_height"], 0],
              runtime.settings.heightScale,
            ],
            "fill-extrusion-vertical-gradient": true,
          },
        });

        // Edge outlines for depth
        map.addLayer({
          id: "nyc-buildings-outline",
          source: sourceId,
          "source-layer": "building",
          type: "line",
          minzoom: 13,
          paint: {
            "line-color": runtime.settings.surfaceColor,
            "line-opacity": 0.25,
            "line-width": 0.8,
          },
        });

        await onSettings(latestSettings);
        runtime.ready("MapLibre ready");
        runtime.reportMetrics();
      });

      // Darken/lighten hex color by a factor (-1 to 1)
      function adjustColor(hex, factor) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const adjust = (c) => {
          if (factor > 0) return Math.round(c + (255 - c) * factor);
          return Math.round(c * (1 + factor));
        };
        return `#${adjust(r).toString(16).padStart(2,"0")}${adjust(g).toString(16).padStart(2,"0")}${adjust(b).toString(16).padStart(2,"0")}`;
      }

      async function onSettings(settings) {
        latestSettings = settings;

        // Swap base map style if changed
        const wantStyle = settings.mapStyle || "light";
        if (wantStyle !== currentMapStyle && MAPLIBRE_STYLES[wantStyle]) {
          currentMapStyle = wantStyle;
          map.setStyle(MAPLIBRE_STYLES[wantStyle]);
          return; // style.load will re-call onSettings
        }

        if (!map.getLayer("nyc-buildings-3d")) {
          return;
        }

        // Zoom offset to match Cesium/ArcGIS framing at the same settings
        const ZOOM_OFFSET = -1.0;
        map.easeTo({
          center: [settings.center.lng, settings.center.lat],
          zoom: settings.zoom + ZOOM_OFFSET,
          pitch: settings.pitch,
          bearing: settings.bearing,
          duration: 800,
        });

        // Light — intensity capped at 1.0 for MapLibre
        map.setLight({
          anchor: "viewport",
          color: "#ffffff",
          intensity: Math.min(1, settings.lightIntensity ?? 0.5),
          position: [1.15, settings.lightAngle ?? 210, settings.lightAltitude ?? 30],
        });

        // Fog — MapLibre 4.x supports setFog
        try {
          if (settings.fog !== false) {
            map.setFog({
              range: [2, 16],
              color: "#e8e6e3",
              "horizon-blend": (settings.fogDensity ?? 0.3) * 0.12,
            });
          } else {
            map.setFog(null);
          }
        } catch (_) { /* fog not supported in this build */ }

        // Ambient occlusion for depth
        try {
          map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-ambient-occlusion-intensity", settings.ambientOcclusion ?? 0.75);
          map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-ambient-occlusion-radius", 6);
        } catch (_) { /* AO not supported */ }

        // Height-based color gradient to match Cesium's depth rendering
        const accent = settings.accentColor;
        const darkBase = adjustColor(accent, -0.3);   // 30% darker for low buildings
        const midTone = adjustColor(accent, -0.1);     // 10% darker for mid
        const tallTint = adjustColor(accent, 0.15);    // 15% lighter for tall
        map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-color", [
          "interpolate", ["linear"],
          ["coalesce", ["get", "render_height"], 20],
          0, darkBase,
          30, accent,
          80, midTone,
          150, tallTint,
        ]);
        map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-opacity", settings.opacity);
        map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-vertical-gradient", settings.verticalGradient !== false);
        map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-height", [
          "*",
          ["coalesce", ["get", "render_height"], 20],
          settings.heightScale,
        ]);
        map.setPaintProperty("nyc-buildings-3d", "fill-extrusion-base", [
          "*",
          ["coalesce", ["get", "render_min_height"], 0],
          settings.heightScale,
        ]);

        // Outlines
        map.setPaintProperty("nyc-buildings-outline", "line-color", settings.surfaceColor);
        map.setPaintProperty("nyc-buildings-outline", "line-width", settings.edgeSize ?? 0.8);

        // Labels
        for (const layer of map.getStyle().layers || []) {
          if (layer.type === "symbol") {
            map.setLayoutProperty(layer.id, "visibility", settings.labels ? "visible" : "none");
          }
        }
      }

      function getCamera() {
        const center = map.getCenter();
        return { lng: center.lng, lat: center.lat };
      }
    </script>
  </body>
</html>
