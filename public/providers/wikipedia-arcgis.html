<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WikiWorld — ArcGIS</title>
    <link href="https://js.arcgis.com/4.34/esri/themes/light/main.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
    <style>
      :root {
        --black: #000;
        --white: #fff;
        --gray-200: #e5e5e5;
        --gray-600: #666;
        --rule: 1px solid var(--black);
        --font: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--white) !important; color: var(--black) !important; font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }
      .esri-view { background: transparent !important; }
      .esri-attribution { display: none !important; }
      .esri-ui { pointer-events: none !important; }

      /* ─── Full-screen map + bottom bar ─── */
      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .map-area {
        position: relative;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      #scene { position: absolute; inset: 0; width: 100%; height: 100%; }

      .map-loading {
        display: none; position: absolute; top: 12px; right: 12px;
        background: var(--white); border: 1px solid var(--gray-200); border-radius: 6px;
        padding: 8px 16px; font-size: 12px; font-weight: 600; z-index: 10;
      }
      .map-loading.active { display: block; }

      /* ─── Bottom bar ─── */
      .bottom-bar {
        border-top: 1px solid var(--gray-200);
        background: var(--white);
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 10000;
        flex-shrink: 0;
        position: relative;
      }

      .bottom-bar .input-row {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--gray-200);
        border-radius: 6px;
        padding: 6px 10px;
        background: var(--white);
        min-width: 0;
      }
      .bottom-bar .input-row:focus-within { border-color: var(--black); }

      .bottom-bar .input-row input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 14px;
        font-family: var(--font);
        background: transparent;
        min-width: 0;
      }
      .bottom-bar .input-row input::placeholder { color: #aaa; }

      .bottom-bar .btn-send {
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: 4px;
        padding: 5px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }

      .bar-icon-wrap {
        position: relative;
        flex-shrink: 0;
      }

      .bar-icon {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        padding: 6px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .bar-icon:hover { color: var(--black); background: #f0f0f0; }
      .bar-icon.active { color: var(--black); }

      /* ─── Popover panels (from bottom bar icons) ─── */
      .popover {
        position: absolute;
        bottom: calc(100% + 12px);
        right: 0;
        background: var(--white);
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        padding: 12px 14px;
        min-width: 180px;
        display: none;
        z-index: 200;
      }
      .popover.open { display: block; }
      .popover h3 {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #999;
        margin: 0 0 8px;
      }

      .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
      .style-btn {
        padding: 6px 8px; border: 1px solid var(--gray-200); border-radius: 4px;
        background: var(--white); font-size: 11px; font-weight: 600;
        cursor: pointer; text-align: center;
      }
      .style-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

      .field { display: flex; flex-direction: column; gap: 3px; margin: 0 0 8px; }
      .field span { font-size: 11px; display: flex; justify-content: space-between; color: #666; }
      .field input[type="range"] { width: 100%; }

      .toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }

      .color-swatch {
        width: 22px; height: 22px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
      }
      .color-swatch:hover { border-color: #999; }
      .color-swatch.active { border-color: #000; box-shadow: 0 0 0 1px #fff inset; }

      /* ─── Article overlay ─── */
      /* ─── Article panel — draggable bottom sheet ─── */
      .article-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: calc(100vh - 48px);
        z-index: 9998;
        background: var(--white);
        border-top: 1px solid var(--gray-200);
        box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
        border-radius: 12px 12px 0 0;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        visibility: hidden;
      }
      .article-panel.tab {
        visibility: visible;
        transform: translateY(calc(100% - 28px)); /* just the drag handle */
      }
      .article-panel.peek {
        visibility: visible;
        transform: translateY(calc(100% - var(--peek-height, 220px)));
      }
      .article-panel.full {
        visibility: visible;
        transform: translateY(0);
      }
      .article-panel.dragging {
        transition: none;
      }
      .article-panel .drag-handle {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 0 4px;
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
      }
      .article-panel .drag-handle:active { cursor: grabbing; }
      .article-panel .drag-handle .handle-bar {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        background: #ccc;
      }
      .article-panel-inner {
        height: calc(100% - 30px);
        overflow-y: auto;
        padding: 8px 40px 40px;
        -webkit-overflow-scrolling: touch;
      }
      .article-panel .article-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .article-panel .article-title {
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -2px;
        line-height: 1.0;
        color: #000;
        flex: 1;
      }
      .article-panel .article-close {
        background: none;
        color: #666;
        border: 1px solid var(--gray-200);
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 14px;
        cursor: pointer;
        margin-left: 16px;
        margin-top: 8px;
        flex-shrink: 0;
      }
      .article-panel .article-close:hover { background: #f5f5f5; color: #000; }
      .article-panel .article-meta {
        font-size: 11px;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 20px;
      }
      .article-panel .article-thumb {
        float: right;
        max-width: 280px;
        margin: 0 0 16px 24px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .article-panel .article-body {
        font-family: "Georgia", "Times New Roman", "Times", serif;
        font-size: 18px;
        font-weight: 400;
        line-height: 1.6;
        color: #222;
      }
      .article-panel .article-body h2 {
        font-family: var(--font);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: #000;
        margin: 28px 0 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--gray-200);
      }
      .article-panel .article-body h3 {
        font-family: var(--font);
        font-size: 17px;
        font-weight: 700;
        color: #000;
        margin: 20px 0 8px;
      }
      .article-panel .article-body p { margin-bottom: 0.8em; }
      .article-panel .article-body a { color: #1a1a1a; text-decoration: underline; text-underline-offset: 2px; }
      .article-panel .article-body a:hover { color: #e63946; }
      .article-panel .article-body ul, .article-panel .article-body ol { margin: 0.5em 0 1em 1.5em; }
      .article-panel .article-body li { margin-bottom: 0.3em; }
      .article-panel .article-body img { max-width: 100%; border-radius: 4px; }
      .article-panel .article-body table { font-size: 14px; border-collapse: collapse; margin: 1em 0; }
      .article-panel .article-body td, .article-panel .article-body th { padding: 4px 8px; border: 1px solid #eee; }
      .article-panel .article-link {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 20px;
        background: #000;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
      }
      .article-panel .article-link:hover { background: #333; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="map-area">
        <div id="scene"></div>
        <div class="map-loading" id="map-loading">Searching…</div>
      </div>

      <div class="bottom-bar">
        <!-- Search input (primary) -->
        <div class="input-row">
          <iconify-icon icon="lucide:search" width="16" style="color:#999;flex-shrink:0"></iconify-icon>
          <input id="wiki-input" type="text" placeholder="Search Wikipedia — e.g. Colosseum, Tokyo Tower…" autocomplete="off" spellcheck="false" />
          <button class="btn-send" id="wiki-go">Go</button>
        </div>

        <div style="width:1px;height:20px;background:#ddd;flex-shrink:0"></div>

        <!-- Map style -->
        <div class="bar-icon-wrap">
          <div class="bar-icon" id="style-icon" title="Map Style">
            <iconify-icon icon="lucide:layers" width="18"></iconify-icon>
          </div>
          <div class="popover" id="style-popover">
            <h3>Map Style</h3>
            <div class="style-grid">
              <button class="style-btn active" data-style="light">Light</button>
              <button class="style-btn" data-style="dark">Dark</button>
              <button class="style-btn" data-style="streets">Streets</button>
              <button class="style-btn" data-style="satellite">Satellite</button>
            </div>
          </div>
        </div>

        <!-- View controls -->
        <div class="bar-icon-wrap">
          <div class="bar-icon" id="view-icon" title="View Controls">
            <iconify-icon icon="lucide:sliders-horizontal" width="18"></iconify-icon>
          </div>
          <div class="popover" id="view-popover" style="min-width:220px">
            <h3>View</h3>
            <label class="field">
              <span>Zoom <strong id="zoom-value">18</strong></span>
              <input id="zoom-range" type="range" min="1" max="22" step="1" value="18" />
            </label>
            <label class="field">
              <span>Pitch <strong id="pitch-value">55°</strong></span>
              <input id="pitch-range" type="range" min="0" max="80" step="1" value="55" />
            </label>
            <label class="field">
              <span>Bearing <strong id="bearing-value">15°</strong></span>
              <input id="bearing-range" type="range" min="0" max="359" step="1" value="15" />
            </label>
            <label class="toggle">
              <input id="buildings-toggle" type="checkbox" checked />
              <span>3D Buildings</span>
            </label>
            <label class="toggle" style="margin-top:6px">
              <input id="shadows-toggle" type="checkbox" checked />
              <span>Shadows</span>
            </label>
            <label class="field" style="margin-top:8px">
              <span>Time of Day <strong id="tod-value">12:00</strong></span>
              <input id="tod-range" type="range" min="0" max="23.75" step="0.25" value="12" />
            </label>
            <label class="field" style="margin-top:8px">
              <span>Highlight Color</span>
              <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
                <span class="color-dot bldg-color active" data-color="#c8c2ba" style="background:#c8c2ba" title="Default"></span>
                <span class="color-dot bldg-color" data-color="#2a2a2a" style="background:#2a2a2a" title="Dark"></span>
                <span class="color-dot bldg-color" data-color="#e63946" style="background:#e63946" title="Red"></span>
                <span class="color-dot bldg-color" data-color="#457b9d" style="background:#457b9d" title="Blue"></span>
                <span class="color-dot bldg-color" data-color="#2a9d8f" style="background:#2a9d8f" title="Teal"></span>
                <span class="color-dot bldg-color" data-color="#e9c46a" style="background:#e9c46a" title="Gold"></span>
                <span class="color-dot bldg-color" data-color="#f4a261" style="background:#f4a261" title="Orange"></span>
                <span class="color-dot bldg-color" data-color="#ffffff" style="background:#ffffff;border:1px solid #ccc" title="White"></span>
              </div>
            </label>
          </div>
        </div>

        <!-- Buildings toggle shortcut -->
        <div class="bar-icon" id="buildings-icon" title="Toggle 3D Buildings">
          <iconify-icon icon="lucide:building-2" width="18"></iconify-icon>
        </div>

        <!-- Typography controls -->
        <div class="bar-icon-wrap">
          <div class="bar-icon" id="type-icon" title="Typography">
            <iconify-icon icon="lucide:type" width="18"></iconify-icon>
          </div>
          <div class="popover" id="type-popover" style="min-width:220px">
            <h3>Typography</h3>
            <label class="field">
              <span>Font Size <strong id="fontsize-value">26px</strong></span>
              <input id="fontsize-range" type="range" min="14" max="48" step="1" value="26" />
            </label>
            <label class="field">
              <span>Font</span>
              <select id="font-select" style="padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:100%">
                <option value="Georgia, serif" selected>Georgia (Serif)</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Helvetica Neue', sans-serif">Helvetica</option>
                <option value="system-ui, sans-serif">System UI</option>
                <option value="'SF Mono', monospace">Monospace</option>
              </select>
            </label>
            <label class="field">
              <span>Color</span>
              <div style="display:flex;gap:4px;flex-wrap:wrap">
                <button class="color-swatch active" data-color="#000" style="background:#000" title="Black"></button>
                <button class="color-swatch" data-color="#fff" style="background:#fff" title="White"></button>
                <button class="color-swatch" data-color="#e63946" style="background:#e63946" title="Red"></button>
                <button class="color-swatch" data-color="#1d3557" style="background:#1d3557" title="Navy"></button>
                <button class="color-swatch" data-color="#457b9d" style="background:#457b9d" title="Steel"></button>
                <button class="color-swatch" data-color="#2a9d8f" style="background:#2a9d8f" title="Teal"></button>
                <button class="color-swatch" data-color="#e9c46a" style="background:#e9c46a" title="Gold"></button>
                <button class="color-swatch" data-color="#666" style="background:#666" title="Gray"></button>
              </div>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="article-panel" id="article-overlay">
      <div class="drag-handle" id="drag-handle"><div class="handle-bar"></div></div>
      <div class="article-panel-inner" id="article-inner">
        <div class="article-header">
          <div class="article-title" id="article-title"></div>
          <button class="article-close" id="article-close">Close</button>
        </div>
        <div class="article-meta" id="article-meta"></div>
        <img class="article-thumb" id="article-thumb" style="display:none" />
        <div class="article-body" id="article-body"></div>
      </div>
    </div>

    <script type="module">
      import WebScene from "https://js.arcgis.com/4.34/@arcgis/core/WebScene.js";
      import SceneView from "https://js.arcgis.com/4.34/@arcgis/core/views/SceneView.js";
      // Renderer imports removed — using ArcGIS's built-in highlight system instead

      // ─── Camera persistence ────────────────────────────────────
      const CAMERA_KEY = "wikiworld-arcgis-camera";
      function loadCamera() {
        try { return JSON.parse(localStorage.getItem(CAMERA_KEY)); } catch { return null; }
      }
      function saveCamera() {
        const cam = view.camera;
        localStorage.setItem(CAMERA_KEY, JSON.stringify({
          lng: cam.position.longitude, lat: cam.position.latitude,
          z: cam.position.z, heading: cam.heading, tilt: cam.tilt,
        }));
      }
      const saved = loadCamera();

      // ─── ArcGIS Scene ──────────────────────────────────────────
      const scene = new WebScene({
        portalItem: { id: "fa4dd90d0bfd470fb0dc9e32eab0bfef" },
      });

      window._arcView = null; // expose for debugging
      const view = window._arcView = new SceneView({
        container: "scene",
        map: scene,
        qualityProfile: "high",
        viewingMode: "global",
        ui: { components: [] },
        camera: {
          position: {
            longitude: saved?.lng ?? -73.98545,
            latitude: saved?.lat ?? 40.75805,
            z: saved?.z ?? 400,
          },
          heading: saved?.heading ?? 15,
          tilt: saved?.tilt ?? 55,
        },
      });

      await view.when();
      await scene.when();

      // Set lighting to current local time so shadows match reality
      // Red highlight instead of default cyan
      view.highlightOptions = {
        color: [230, 57, 70],
        haloColor: [230, 57, 70],
        haloOpacity: 0.9,
        fillOpacity: 0.85,
      };

      // Force consistent daytime lighting
      // cameraTrackingEnabled: false so sun doesn't change when flying to different timezones
      function setLightingTime(hour) {
        const d = new Date();
        d.setUTCHours(hour, 0, 0, 0);
        view.environment = {
          lighting: {
            type: "sun",
            date: d,
            directShadowsEnabled: true,
            ambientOcclusionEnabled: true,
            cameraTrackingEnabled: false,
          },
          atmosphere: { quality: "high" },
        };
      }
      setLightingTime(12); // noon UTC — consistent everywhere

      view.watch("camera", saveCamera);

      const buildingsLayer = scene.allLayers.find(l => l.title === "OpenStreetMap 3D Buildings");

      // Highlight color for selected buildings (search + click)
      let highlightColor = "#e63946";
      function setHighlightColor(hex) {
        highlightColor = hex;
        // Parse hex to RGB array
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        view.highlightOptions = {
          color: [r, g, b],
          haloColor: [r, g, b],
          haloOpacity: 0.9,
          fillOpacity: 0.85,
        };
        console.log("Highlight color set to", hex);
      }

      if (buildingsLayer) {
        buildingsLayer.popupEnabled = false;
      }
      view.popup.autoOpenEnabled = false;

      // ─── Building highlight on search ──────────────────────────
      let activeHighlight = null;

      async function highlightBuildingAtLocation(lat, lng) {
        if (activeHighlight) {
          activeHighlight.remove();
          activeHighlight = null;
        }
        if (!buildingsLayer) { console.warn("No buildings layer"); return; }

        const layerView = await view.whenLayerView(buildingsLayer);

        // Retry hitTest up to 5 times with delays — tiles need time to load
        for (let attempt = 0; attempt < 5; attempt++) {
          await new Promise(r => setTimeout(r, attempt === 0 ? 500 : 1500));

          try {
            const screenPoint = view.toScreen({ x: lng, y: lat, spatialReference: { wkid: 4326 } });
            if (!screenPoint) continue;

            // Sample a grid of points around the target (building might not be at exact center)
            const offsets = [
              [0, 0], [-15, 0], [15, 0], [0, -15], [0, 15],
              [-15, -15], [15, -15], [-15, 15], [15, 15],
            ];

            // Collect hits with their geographic positions
            const candidates = new Map(); // oid → { oid, dist }
            for (const [dx, dy] of offsets) {
              const pt = { x: screenPoint.x + dx, y: screenPoint.y + dy };
              const hit = await view.hitTest(pt, { include: [buildingsLayer] });
              for (const r of (hit.results || [])) {
                if (r.graphic?.layer === buildingsLayer) {
                  const oid = r.graphic.getObjectId();
                  if (oid == null) continue;
                  // Calculate distance from hit point to target coordinates
                  const mapPt = r.mapPoint;
                  if (mapPt) {
                    const dLat = (mapPt.latitude - lat) * 111320;
                    const dLng = (mapPt.longitude - lng) * 111320 * Math.cos(lat * Math.PI / 180);
                    const dist = Math.sqrt(dLat * dLat + dLng * dLng);
                    if (!candidates.has(oid) || dist < candidates.get(oid).dist) {
                      candidates.set(oid, { oid, dist });
                    }
                  } else {
                    candidates.set(oid, { oid, dist: 0 });
                  }
                }
              }
            }

            // Only highlight buildings within 50m of target coordinates
            const nearby = [...candidates.values()]
              .filter(c => c.dist < 50)
              .map(c => c.oid);

            if (nearby.length > 0) {
              activeHighlight = layerView.highlight(nearby);
              console.log(`Highlighted ${nearby.length} buildings within 50m (attempt ${attempt + 1})`);
              return;
            }
            // If nothing within 50m but we have candidates, log for debugging
            if (candidates.size > 0) {
              const closest = [...candidates.values()].sort((a, b) => a.dist - b.dist)[0];
              console.log(`Attempt ${attempt + 1}: closest building is ${closest.dist.toFixed(0)}m away`);
            }
          } catch (e) {
            console.warn(`Highlight attempt ${attempt + 1} failed:`, e);
          }
        }
        console.log("Building highlight: no features found after 5 attempts");
      }

      // ─── Click-to-highlight buildings ─────────────────────────
      view.on("click", async (event) => {
        const hitResult = await view.hitTest(event, { include: [buildingsLayer] });
        const bldgResults = hitResult.results.filter(r => r.graphic?.layer === buildingsLayer);
        if (bldgResults.length > 0) {
          if (activeHighlight) { activeHighlight.remove(); activeHighlight = null; }
          const layerView = await view.whenLayerView(buildingsLayer);
          const objectIds = bldgResults.map(r => r.graphic.getObjectId());
          activeHighlight = layerView.highlight(objectIds);
          console.log(`Click-highlighted building OIDs: ${objectIds}`);
        }
      });

      // ─── UI refs ───────────────────────────────────────────────
      const loadingEl = document.getElementById("map-loading");
      const searchInput = document.getElementById("wiki-input");
      const searchBtn = document.getElementById("wiki-go");
      const zoomRange = document.getElementById("zoom-range");
      const zoomValue = document.getElementById("zoom-value");
      const pitchRange = document.getElementById("pitch-range");
      const pitchValue = document.getElementById("pitch-value");
      const bearingRange = document.getElementById("bearing-range");
      const bearingValue = document.getElementById("bearing-value");
      const buildingsToggle = document.getElementById("buildings-toggle");

      // ─── Popover toggles ──────────────────────────────────────
      const styleIcon = document.getElementById("style-icon");
      const stylePopover = document.getElementById("style-popover");
      const viewIcon = document.getElementById("view-icon");
      const viewPopover = document.getElementById("view-popover");
      const typeIcon = document.getElementById("type-icon");
      const typePopover = document.getElementById("type-popover");

      const allPopovers = [
        [stylePopover, styleIcon],
        [viewPopover, viewIcon],
        [typePopover, typeIcon],
      ];

      function closeAllPopovers() {
        for (const [pop, icon] of allPopovers) {
          pop.classList.remove("open");
          icon.classList.remove("active");
        }
      }

      function togglePopover(popover, icon) {
        return (e) => {
          e.stopPropagation();
          const wasOpen = popover.classList.contains("open");
          closeAllPopovers();
          if (!wasOpen) { popover.classList.add("open"); icon.classList.add("active"); }
        };
      }

      styleIcon.addEventListener("click", togglePopover(stylePopover, styleIcon));
      viewIcon.addEventListener("click", togglePopover(viewPopover, viewIcon));
      typeIcon.addEventListener("click", togglePopover(typePopover, typeIcon));

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".popover") && !e.target.closest(".bar-icon") && !e.target.closest(".bar-icon-wrap")) closeAllPopovers();
      });
      for (const [pop] of allPopovers) pop.addEventListener("click", (e) => e.stopPropagation());

      // Buildings quick-toggle
      const buildingsIcon = document.getElementById("buildings-icon");
      buildingsIcon.addEventListener("click", (e) => {
        e.stopPropagation();
        closeAllPopovers();
        buildingsToggle.checked = !buildingsToggle.checked;
        if (buildingsLayer) buildingsLayer.visible = buildingsToggle.checked;
        buildingsIcon.classList.toggle("active", buildingsToggle.checked);
      });
      buildingsIcon.classList.add("active"); // starts on

      // ─── Lighting controls ─────────────────────────────────────
      const todRange = document.getElementById("tod-range");
      const todValue = document.getElementById("tod-value");
      const shadowsToggle = document.getElementById("shadows-toggle");

      function formatTime(h) {
        const hr = Math.floor(h);
        const min = Math.round((h - hr) * 60);
        const ampm = hr >= 12 ? "PM" : "AM";
        const h12 = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
        return `${h12}:${min.toString().padStart(2, "0")} ${ampm}`;
      }

      function updateLighting() {
        const h = +todRange.value;
        todValue.textContent = formatTime(h);
        setLightingTime(h);
        view.environment.lighting.directShadowsEnabled = shadowsToggle.checked;
      }

      todRange.addEventListener("input", updateLighting);
      shadowsToggle.addEventListener("change", updateLighting);

      // ─── Building color controls ──────────────────────────────
      document.querySelectorAll(".bldg-color").forEach(dot => {
        dot.addEventListener("click", () => {
          document.querySelectorAll(".bldg-color").forEach(d => d.classList.remove("active"));
          dot.classList.add("active");
          setHighlightColor(dot.dataset.color);
        });
      });

      // ─── Typography controls ───────────────────────────────────
      const fontsizeRange = document.getElementById("fontsize-range");
      const fontsizeValue = document.getElementById("fontsize-value");
      const fontSelect = document.getElementById("font-select");
      let textColor = "#000";

      function applyTypography() {
        const body = document.getElementById("article-body");
        const title = document.getElementById("article-title");
        body.style.fontSize = fontsizeRange.value + "px";
        body.style.fontFamily = fontSelect.value;
        body.style.color = textColor;
        title.style.color = textColor;
      }

      fontsizeRange.addEventListener("input", () => {
        fontsizeValue.textContent = fontsizeRange.value + "px";
        applyTypography();
      });
      fontSelect.addEventListener("change", applyTypography);

      document.querySelectorAll(".color-swatch").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          textColor = btn.dataset.color;
          document.querySelectorAll(".color-swatch").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          applyTypography();
        });
      });

      // ─── Map style ────────────────────────────────────────────
      let currentStyle = "light";
      document.querySelectorAll(".style-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const style = btn.dataset.style;
          if (style === currentStyle) return;
          currentStyle = style;
          document.querySelectorAll(".style-btn").forEach(b => b.classList.toggle("active", b === btn));

          const basemaps = {
            light: "topo-vector",
            dark: "dark-gray-vector",
            streets: "streets-navigation-vector",
            satellite: "satellite",
          };
          view.map.basemap = basemaps[style] || "topo-vector";
        });
      });

      // ─── View controls ────────────────────────────────────────
      zoomRange.addEventListener("input", () => {
        const val = +zoomRange.value;
        zoomValue.textContent = val;
        view.goTo({ zoom: val }, { duration: 300 });
      });

      pitchRange.addEventListener("input", () => {
        const val = +pitchRange.value;
        pitchValue.textContent = val + "°";
        view.goTo({ tilt: val }, { duration: 300 });
      });

      bearingRange.addEventListener("input", () => {
        const val = +bearingRange.value;
        bearingValue.textContent = val + "°";
        view.goTo({ heading: val }, { duration: 300 });
      });

      buildingsToggle.addEventListener("change", () => {
        if (buildingsLayer) buildingsLayer.visible = buildingsToggle.checked;
      });

      // Sync sliders when user rotates/tilts manually
      view.watch("camera", (cam) => {
        const z = Math.round(view.zoom);
        zoomRange.value = z;
        zoomValue.textContent = z;
        pitchRange.value = Math.round(cam.tilt);
        pitchValue.textContent = Math.round(cam.tilt) + "°";
        bearingRange.value = Math.round(cam.heading);
        bearingValue.textContent = Math.round(cam.heading) + "°";
      });

      // ─── Article overlay ──────────────────────────────────────
      const overlayEl = document.getElementById("article-overlay");
      const overlayTitle = document.getElementById("article-title");
      const overlayMeta = document.getElementById("article-meta");
      const overlayBody = document.getElementById("article-body");
      const overlayClose = document.getElementById("article-close");

      // ─── Three-state panel: collapsed → peek → full ──────────
      const dragHandle = document.getElementById("drag-handle");
      const articleInner = document.getElementById("article-inner");
      let panelState = "collapsed"; // "collapsed" | "tab" | "peek" | "full"

      function setPanelState(state) {
        panelState = state;
        overlayEl.classList.remove("tab", "peek", "full");
        if (state === "tab") overlayEl.classList.add("tab");
        else if (state === "peek") overlayEl.classList.add("peek");
        else if (state === "full") overlayEl.classList.add("full");
        if (state === "collapsed") {
          overlayLock++;
          articleInner.scrollTop = 0;
        }
        articleInner.style.overflowY = state === "full" ? "auto" : "hidden";
      }

      overlayClose.addEventListener("click", () => setPanelState("tab"));
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (panelState === "full") setPanelState("peek");
          else if (panelState === "peek") setPanelState("tab");
        }
      });

      // ─── Drag handling ────────────────────────────────────────
      let dragStartY = 0, dragStartTranslate = 0, isDragging = false;
      const panelFullHeight = () => window.innerHeight - 48;

      function getPanelTranslateY() {
        const t = getComputedStyle(overlayEl).transform;
        if (!t || t === "none") return 0;
        const m = t.match(/matrix.*\((.+)\)/);
        return m ? parseFloat(m[1].split(",").pop()) : 0;
      }

      function onDragStart(e) {
        if (panelState === "collapsed") return;
        isDragging = true;
        dragStartY = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
        dragStartTranslate = getPanelTranslateY();
        overlayEl.classList.add("dragging");
        e.preventDefault();
      }

      function onDragMove(e) {
        if (!isDragging) return;
        const y = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
        const dy = y - dragStartY;
        const fullH = panelFullHeight();
        const maxDown = fullH - 28; // stop at tab (drag handle visible)
        const newTranslate = Math.max(0, Math.min(maxDown, dragStartTranslate + dy));
        overlayEl.style.transform = `translateY(${newTranslate}px)`;
        e.preventDefault();
      }

      function onDragEnd() {
        if (!isDragging) return;
        isDragging = false;
        overlayEl.classList.remove("dragging");
        overlayEl.style.transform = "";

        const currentY = getPanelTranslateY();
        const fullH = panelFullHeight();
        const peekOffset = fullH - 220;
        const tabOffset = fullH - 28;

        if (panelState === "full") {
          if (currentY > peekOffset - 40) setPanelState("peek");
          else setPanelState("full");
        } else if (panelState === "peek") {
          if (currentY < peekOffset - 80) setPanelState("full");
          else if (currentY > peekOffset + 80) setPanelState("tab");
          else setPanelState("peek");
        } else if (panelState === "tab") {
          if (currentY < tabOffset - 80) setPanelState("peek");
          else setPanelState("tab");
        }
      }

      // Tap handle to cycle: tab → peek → full → peek
      dragHandle.addEventListener("click", () => {
        if (panelState === "tab") setPanelState("peek");
        else if (panelState === "peek") setPanelState("full");
        else if (panelState === "full") setPanelState("peek");
      });

      dragHandle.addEventListener("mousedown", onDragStart);
      dragHandle.addEventListener("touchstart", onDragStart, { passive: false });
      document.addEventListener("mousemove", onDragMove);
      document.addEventListener("touchmove", onDragMove, { passive: false });
      document.addEventListener("mouseup", onDragEnd);
      document.addEventListener("touchend", onDragEnd);

      function stripPronunciation(text) {
        return text
          // Entire paren starting with phonetic guide: ( KOL-ə-SEE-əm, ...anything... )
          .replace(/\s*\(\s*[A-Za-zɑɒæəɛɜɪɔʊʌˈˌːʲ\s]*-[A-Za-zɑɒæəɛɜɪɔʊʌˈˌːʲ\s-]+,?[^)]*\)/g, "")
          // (listen), (pronunciation), [IPA]
          .replace(/\s*\([^)]*\b(listen|pronunciation|IPA)\b[^)]*\)/gi, "")
          .replace(/\s*\[[^\]]*\b(listen|IPA|pronunciation)\b[^\]]*\]/gi, "")
          // /slash IPA/
          .replace(/\s*\/[^/]*\/\s*/g, " ")
          // (Italian: Name [IPA]) or (French: Name)
          .replace(/\s*\(\s*[A-Z][a-z]+:\s*[^)]*\[.*?\][^)]*\)/g, "")
          .replace(/\s*\(\s*[A-Z][a-z]+:\s*[A-ZÀ-ž][^)]{0,40}\)/g, "")
          // [standalone IPA]
          .replace(/\s*\[[\w\sˈˌːʲʃʒŋɹɪɛæɔʊəðθɡɑɜʌɒ.ˑ]+\]/g, "")
          // Parens with heavy IPA characters
          .replace(/\s*\([^)]*[ˈˌːɪɛæɔʊəɹʃʒŋðθɡɑɜʌɒ]{2,}[^)]*\)/g, "")
          // ; French: Name etc mid-sentence
          .replace(/;\s*[A-Z][a-z]+:\s*\S+(\s+\S+){0,3}(?=[,;.])/g, "")
          .replace(/\s{2,}/g, " ")
          .replace(/\s+([,;.])/g, "$1")
          .trim();
      }

      let overlayLock = 0; // prevent accidental closure

      const overlayThumb = document.getElementById("article-thumb");

      async function showArticleOverlay(title, meta) {
        const myLock = ++overlayLock;
        overlayTitle.textContent = title;
        overlayMeta.textContent = meta || "";
        overlayBody.innerHTML = `<p style="color:#999">Loading article…</p>`;
        overlayThumb.style.display = "none";
        setPanelState("peek");
        articleInner.scrollTop = 0;

        try {
          // Fetch plaintext extract + thumbnail + info
          const url = new URL("https://en.wikipedia.org/w/api.php");
          url.searchParams.set("action", "query");
          url.searchParams.set("titles", title);
          url.searchParams.set("prop", "extracts|pageimages|info");
          url.searchParams.set("explaintext", "");
          url.searchParams.set("exsectionformat", "plain");
          url.searchParams.set("inprop", "url");
          url.searchParams.set("piprop", "thumbnail");
          url.searchParams.set("pithumbsize", "400");
          url.searchParams.set("format", "json");
          url.searchParams.set("origin", "*");

          const resp = await fetch(url);
          const data = await resp.json();
          const page = Object.values(data?.query?.pages || {})[0];

          if (!page || page.missing) {
            overlayBody.innerHTML = `<p>No Wikipedia article found for "${title}".</p>`;
            return;
          }

          if (myLock !== overlayLock) return; // stale

          // Show thumbnail if available
          if (page.thumbnail?.source) {
            overlayThumb.src = page.thumbnail.source;
            overlayThumb.style.display = "block";
          }

          // Process plaintext extract
          let text = stripPronunciation(page.extract || "");
          const wikiUrl = page.fullurl || `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`;

          // Convert plaintext to HTML: sections become h2, paragraphs become p
          const lines = text.split(/\n/);
          let html = "";
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;
            // Section headers: lines that are "== Title ==" in plaintext
            if (/^==\s+/.test(trimmed)) {
              const level = trimmed.startsWith("===") ? "h3" : "h2";
              const heading = trimmed.replace(/^=+\s*/, "").replace(/\s*=+$/, "");
              html += `<${level}>${heading}</${level}>`;
            } else {
              html += `<p>${trimmed}</p>`;
            }
          }
          html += `<a class="article-link" href="${wikiUrl}" target="_blank">Read full article on Wikipedia →</a>`;

          overlayBody.innerHTML = html;
          overlayTitle.textContent = page.title || title;
          applyTypography();
        } catch (err) {
          if (myLock !== overlayLock) return;
          overlayBody.innerHTML = `<p>Error loading article: ${err.message}</p>`;
        }
      }

      // ─── Search ───────────────────────────────────────────────
      async function handleSearch() {
        const query = searchInput.value.trim();
        if (!query) return;

        overlayEl.classList.remove("open");
        loadingEl.classList.add("active");

        try {
          let targetLat, targetLon, targetTitle = query;

          // Try Wikipedia first
          const searchUrl = new URL("https://en.wikipedia.org/w/api.php");
          searchUrl.searchParams.set("action", "query");
          searchUrl.searchParams.set("list", "search");
          searchUrl.searchParams.set("srsearch", query);
          searchUrl.searchParams.set("srlimit", "5");
          searchUrl.searchParams.set("format", "json");
          searchUrl.searchParams.set("origin", "*");

          const resp = await fetch(searchUrl);
          const data = await resp.json();
          const results = data?.query?.search || [];

          if (results.length) {
            targetTitle = results[0].title;
            const pageids = results.map(r => r.pageid).join("|");
            const coordUrl = new URL("https://en.wikipedia.org/w/api.php");
            coordUrl.searchParams.set("action", "query");
            coordUrl.searchParams.set("pageids", pageids);
            coordUrl.searchParams.set("prop", "coordinates");
            coordUrl.searchParams.set("format", "json");
            coordUrl.searchParams.set("origin", "*");

            const coordResp = await fetch(coordUrl);
            const pages = (await coordResp.json())?.query?.pages || {};
            for (const r of results) {
              const p = pages[r.pageid];
              if (p?.coordinates?.length) {
                targetLat = p.coordinates[0].lat;
                targetLon = p.coordinates[0].lon;
                targetTitle = p.title;
                break;
              }
            }
          }

          // Fallback: Nominatim
          if (!targetLat) {
            const geo = await fetch(
              `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
              { headers: { "User-Agent": "WikiWorld/1.0" } }
            );
            const geoData = await geo.json();
            if (geoData.length) {
              targetLat = parseFloat(geoData[0].lat);
              targetLon = parseFloat(geoData[0].lon);
            }
          }

          if (!targetLat) return;

          // Fetch building height to adjust pitch
          let buildingHeight = 0;
          try {
            const bldgResp = await fetch(`/api/building-polygon?q=${encodeURIComponent(targetTitle)}`);
            const bldg = await bldgResp.json();
            if (bldg.found && bldg.height) buildingHeight = bldg.height;
          } catch (_) {}

          // Cinematic camera adapted to building height:
          // SHORT (< 30m): overhead view — look DOWN to avoid surrounding buildings blocking view
          // MEDIUM (30-150m): mid-angle — balanced view
          // TALL (150m+): street-level hero — look UP at the building
          const heading = 15;
          const h = Math.max(buildingHeight, 10);
          let autoTilt, autoZoom, offsetMeters;

          if (h < 30) {
            // Short/ground-level landmarks (memorials, plazas, small buildings)
            // Close overhead view — zoom in tight so they fill the frame
            autoTilt = 50;
            autoZoom = 19;
            offsetMeters = 20;
          } else if (h < 150) {
            // Medium buildings — balanced angle
            autoTilt = Math.min(68, 55 + h * 0.08);
            autoZoom = 18;
            offsetMeters = h * 0.6 + 40;
          } else {
            // Tall/supertall — cinematic street-level hero shot
            autoTilt = Math.min(72, 65 + h * 0.01);
            autoZoom = Math.max(16, 18.5 - Math.log2(h / 10) * 0.4);
            offsetMeters = h * 0.8 + 50;
          }

          // Offset camera target opposite to heading so building is IN the frame
          // heading=15 means looking NNE, so offset camera target to SSW
          const headingRad = (heading + 180) * Math.PI / 180; // opposite direction
          const latPerMeter = 1 / 111320;
          const lngPerMeter = 1 / (111320 * Math.cos(targetLat * Math.PI / 180));
          const camLat = targetLat + Math.cos(headingRad) * offsetMeters * latPerMeter;
          const camLng = targetLon + Math.sin(headingRad) * offsetMeters * lngPerMeter;

          // Show article overlay first, then fly
          const meta = buildingHeight ? `${buildingHeight.toFixed(0)}m` : "";
          showArticleOverlay(targetTitle, meta);

          // Fly to offset position looking toward the building
          await view.goTo({
            target: [camLng, camLat],
            zoom: autoZoom,
            heading: heading,
            tilt: autoTilt,
          }, { duration: 2000 });

          // Highlight the building at the search location
          highlightBuildingAtLocation(targetLat, targetLon);

        } catch (err) {
          console.error("Search error:", err);
        } finally {
          loadingEl.classList.remove("active");
        }
      }

      searchBtn.addEventListener("click", handleSearch);
      searchInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleSearch(); });
    </script>
  </body>
</html>
