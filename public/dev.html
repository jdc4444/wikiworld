<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cesium Dev — ArcGIS Benchmark</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #111; color: #eee; font-family: -apple-system, system-ui, sans-serif; }

      .dev-shell {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      .dev-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 16px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        flex-wrap: wrap;
      }
      .dev-header h1 {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }
      .dev-header .label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .dev-panes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        background: #333;
      }

      .dev-pane {
        position: relative;
        background: #111;
      }
      .dev-pane__label {
        position: absolute;
        top: 8px;
        left: 12px;
        z-index: 10;
        background: rgba(0,0,0,0.7);
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 4px;
        pointer-events: none;
      }
      .dev-pane__label--ref {
        background: rgba(0,80,200,0.8);
      }
      .dev-pane iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="dev-shell">
      <header class="dev-header">
        <h1>Cesium Dev &mdash; ArcGIS Benchmark</h1>
        <span class="label">Left: Cesium (building) &middot; Right: ArcGIS (reference)</span>
      </header>
      <div class="dev-panes">
        <div class="dev-pane" id="cesium-pane">
          <div class="dev-pane__label">Cesium OSM — Building</div>
          <iframe id="cesium-frame" loading="eager"></iframe>
        </div>
        <div class="dev-pane" id="arcgis-pane">
          <div class="dev-pane__label dev-pane__label--ref">ArcGIS — Reference</div>
          <iframe id="arcgis-frame" loading="eager"></iframe>
        </div>
      </div>
    </div>

    <script type="module">
      const SHELL_SOURCE = "nyc-3d-stack-tester-shell";
      const PROVIDER_SOURCE = "nyc-3d-stack-tester-provider";

      const config = await fetch("/api/config").then(r => r.json());
      const preset = config.nycPresets.find(p => p.id === config.defaultSettings.presetId) || config.nycPresets[0];
      const settings = {
        ...config.defaultSettings,
        center: preset.center,
        altitudeMeters: preset.altitudeMeters,
      };

      // Build iframe URLs
      function buildSrc(providerPath, providerId) {
        const params = new URLSearchParams({ provider: providerId });
        for (const [k, v] of Object.entries(config.env)) {
          if (v) params.set(k, v);
        }
        return `${providerPath}?${params}`;
      }

      const cesiumFrame = document.getElementById("cesium-frame");
      const arcgisFrame = document.getElementById("arcgis-frame");

      cesiumFrame.src = buildSrc("/providers/cesium-osm.html", "cesium-osm");
      arcgisFrame.src = buildSrc("/providers/arcgis.html", "arcgis");

      // Broadcast settings to both
      function broadcast(s) {
        const msg = { source: SHELL_SOURCE, type: "apply-settings", payload: s };
        cesiumFrame.contentWindow?.postMessage(msg, location.origin);
        arcgisFrame.contentWindow?.postMessage(msg, location.origin);
      }

      // Wait for ready, then push initial settings
      let readyCount = 0;
      window.addEventListener("message", (e) => {
        if (e.data?.source !== PROVIDER_SOURCE) return;
        if (e.data.type === "ready") {
          readyCount++;
          if (readyCount >= 2) {
            broadcast(settings);
          } else {
            // Send to the one that's ready now
            const target = e.data.providerId === "cesium-osm" ? cesiumFrame : arcgisFrame;
            target.contentWindow?.postMessage(
              { source: SHELL_SOURCE, type: "apply-settings", payload: settings },
              location.origin
            );
          }
        }
      });
    </script>
  </body>
</html>
